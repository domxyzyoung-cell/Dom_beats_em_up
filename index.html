<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dom beats them up.</title>
    <style>
        * {
            box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0;
            touch-action: none;
        }
        body {
            background-color: #05050a; font-family: 'Courier New', Courier, monospace; color: #fff;
            overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #game-container {
            position: relative; width: 800px; height: 400px;
            background: linear-gradient(to bottom, #0f1326 0%, #171b30 60%, #05060a 100%);
            border: 4px solid #3a3f58; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 8px;
        }
        
        /* Screens configuration */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(5, 5, 10, 0.96); z-index: 20;
        }
        .hidden { display: none !important; }
        
        h1 {
            font-size: 3rem; color: #ff2a35; text-shadow: 0 0 15px rgba(255,42,53,0.6);
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; text-align: center;
        }
        h2 { font-size: 1.5rem; color: #ffd700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .menu-group { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; max-width: 600px; }
        
        button {
            padding: 14px 20px; font-size: 1.1rem; font-family: inherit; background: #141724;
            color: #fff; border: 2px solid #4a4f6d; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase;
            font-weight: bold; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background: #ff2a35; border-color: #fff; box-shadow: 0 0 20px rgba(255,42,53,0.7); transform: translateY(-2px); }
        .char-btn { font-size: 0.95rem; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px;}
        .char-btn span { font-size: 26px; }
        
        /* HUD UI */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 5;
        }
        .health-bar-container { width: 36%; height: 22px; background: #1a1a26; border: 2px solid #fff; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.6); border-radius: 3px; }
        .health-fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.1s ease-out; }
        #enemy-fill { background: #e74c3c; float: right; }
        .char-info { position: absolute; top: -22px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; color: #cbd5e1; letter-spacing: 1px; text-shadow: 0 2px 4px #000; }
        #enemy-info { right: 0; text-align: right; }
        #match-stats { text-align: center; font-size: 1.6rem; font-weight: bold; text-shadow: 0 2px 5px #000; min-width: 100px; }
        #level-badge { color: #ffd700; font-size: 0.85rem; display: block; margin-top: 3px; letter-spacing: 1px; }

        /* Fighter Base Dynamics (Perfect Symmetrical Line Alignment) */
        .fighter {
            position: absolute; bottom: 20px; width: 110px; height: 140px;
            transition: transform 0.02s linear; transform-origin: bottom center;
        }
        
        /* Core wrapper that centers the skeleton perfectly */
        .sprite {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        #enemy .sprite { transform: scaleX(-1); }

        /* Anatomy block positioning aligned cleanly on vertical line axis */
        .head {
            position: relative; width: 34px; height: 34px;
            border-radius: 50%; border: 3px solid var(--char-color); background: #111; z-index: 3;
            margin-top: 8px; flex-shrink: 0;
        }
        .eyes { position: absolute; top: 8px; right: 4px; display: flex; gap: 3px; }
        .eye { width: 4px; height: 4px; background: var(--eye-color, #fff); border-radius: 50%; }
        
        .torso {
            position: relative; width: var(--torso-width, 16px); height: 46px;
            background: var(--torso-color, var(--char-color)); z-index: 2; border-radius: 4px;
            margin-top: -1px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        
        /* Symmetrical Appendages calculated from Center line */
        .arm {
            position: absolute; top: 44px; width: var(--arm-width, 38px); height: 6px;
            background: var(--limb-color, var(--char-color)); z-index: 4;
            transition: transform 0.08s, width 0.08s; border-radius: 3px;
        }
        .arm-left { right: calc(50% + var(--torso-width, 16px) / 2 - 4px); transform-origin: right center; transform: rotate(135deg); }
        .arm-right { left: calc(50% + var(--torso-width, 16px) / 2 - 4px); transform-origin: left center; transform: rotate(45deg); }
        
        .leg {
            position: absolute; top: 87px; width: 7px; height: 46px;
            background: var(--limb-color, var(--char-color)); z-index: 1;
            transition: transform 0.08s; border-radius: 3px; transform-origin: center top;
        }
        .leg-left { left: calc(50% - 7px); transform: rotate(12deg); }
        .leg-right { right: calc(50% - 7px); transform: rotate(-12deg); }

        /* --- CHARACTER SPECIFIC ACCESSORIES & COSTUMES --- */
        .accessory { display: none; position: absolute; }

        /* Speedways */
        .theme-speedways .acc-hat { display: block; top: -6px; left: 50%; width: 38px; height: 6px; background: #000; border-radius: 1px; z-index: 5; transform: translateX(-50%); }
        .theme-speedways .acc-hat::after { content:''; position: absolute; top: -8px; left: 7px; border-bottom: 8px solid #000; border-left: 12px solid transparent; border-right: 12px solid transparent;}
        
        /* Premium Costume Logic for Lee & Blue Ninja */
        .theme-lee { --char-color: #111; --torso-color: #111; --limb-color: #111; }
        .theme-lee .acc-mask { display: block; top: 6px; left: -2px; width: 34px; height: 10px; background: #e51b24; z-index: 4; }
        .theme-lee .acc-bow { display: block; top: 8px; left: -8px; width: 10px; height: 8px; background: #e51b24; z-index: 4; clip-path: polygon(0 0, 100% 50%, 0 100%, 30% 50%); }
        .theme-lee .acc-belt { display: block; bottom: 6px; width: calc(var(--torso-width, 16px) + 4px); height: 6px; background: #e51b24; z-index: 5; }
        .theme-lee .arm::after { content: ''; position: absolute; right: 0; top: 0; width: 8px; height: 100%; background: #e51b24; border-radius: 50%; }
        .theme-lee .arm-left::after { left: 0; right: auto; }
        .theme-lee .leg::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #e51b24; border-radius: 1px; }

        .theme-ninja-enemy { --char-color: #111; --torso-color: #111; --limb-color: #111; }
        .theme-ninja-enemy .acc-mask { display: block; top: 6px; left: -2px; width: 34px; height: 10px; background: #0033ff; z-index: 4; }
        .theme-ninja-enemy .acc-bow { display: block; top: 8px; left: -8px; width: 10px; height: 8px; background: #0033ff; z-index: 4; clip-path: polygon(0 0, 100% 50%, 0 100%, 30% 50%); }
        .theme-ninja-enemy .acc-belt { display: block; bottom: 6px; width: calc(var(--torso-width, 16px) + 4px); height: 6px; background: #0033ff; z-index: 5; }
        .theme-ninja-enemy .arm::after { content: ''; position: absolute; right: 0; top: 0; width: 8px; height: 100%; background: #0033ff; border-radius: 50%; }
        .theme-ninja-enemy .arm-left::after { left: 0; right: auto; }
        .theme-ninja-enemy .leg::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: #0033ff; border-radius: 1px; }

        /* Dom */
        .theme-dom { transform: scale(1.15) !important; }
        .theme-dom .torso { width: 18px; --torso-width: 18px; background: linear-gradient(to bottom, #008C45 33%, #F4F5F0 33%, #F4F5F0 66%, #CD212A 66%); }
        .theme-dom .arm { width: 40px; height: 7px; }

        /* Spaniard */
        .theme-spaniard { transform: scale(0.75) !important; }
        .theme-spaniard .torso { width: 14px; --torso-width: 14px; background: linear-gradient(to bottom, #AA151B 25%, #F1BF00 25%, #F1BF00 75%, #AA151B 75%); }

        /* Catterson */
        .theme-catterson .acc-clover { display: block; top: 12px; color: #008000; font-size: 18px; font-weight: bold; text-shadow: 0 0 2px #fff; }

        /* Jeff */
        .theme-jeff .head { background: #222; border-color: #444; }
        .theme-jeff .acc-visor { display: block; top: 8px; right: 2px; width: 16px; height: 8px; background: #ffd700; border-radius: 2px; z-index: 4; }

        /* Dynamic Boss: Drogon Style Profiles */
        .theme-drogon { transform: scale(1.5) !important; --char-color: #111; --torso-color: #111; --limb-color: #111; }
        .theme-drogon .head { background: #000; border: 3px solid #ff6a00; box-shadow: 0 0 10px #ff6a00; }
        .theme-drogon .eye { background: #ff0000; box-shadow: 0 0 6px #ff0000; }
        .theme-drogon .acc-mouth { display: block; bottom: 4px; right: 4px; width: 10px; height: 4px; background: #ff0000; border-radius: 2px; }
        .theme-drogon .torso { background: #000; border: 2px solid #ff6a00; box-shadow: 0 0 12px #ff6a00; width: 22px; --torso-width: 22px; }
        .theme-drogon .arm, .theme-drogon .leg { background: #000; border: 1px solid #ff6a00; }
        .theme-drogon .wings { display: block !important; top: 15px; }

        /* Standard Stage Elements */
        .theme-angel .halo, .theme-angel .wings { display: block; --wing-color: #ffffff; }
        .theme-devil .horns, .theme-devil .wings { display: block; --wing-color: #4a0000; }

        .halo { display: none; position: absolute; top: -8px; left: 50%; width: 34px; height: 8px; border-radius: 50%; border: 2px solid #ffd700; box-shadow: 0 0 8px #ffd700; z-index: 5; transform: translateX(-50%); }
        .wings { display: none; position: absolute; top: 10px; width: 70px; height: 30px; opacity: 0.75; z-index: 0; }
        .wing-l, .wing-r { position: absolute; width: 35px; height: 18px; border-radius: 50% 50% 0 0; background: var(--wing-color, #fff); transform-origin: bottom right;}
        .wing-l { left: -8px; transform: rotate(-25deg); }
        .wing-r { right: -8px; transform: scaleX(-1) rotate(-25deg); }
        .horns { display: none; position: absolute; top: -6px; width: 100%; padding: 0 4px; display: flex; justify-content: space-between; z-index: 5;}
        .horn { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 10px solid #ff2a35; transform: rotate(-20deg); }
        .horn-r { transform: rotate(20deg); }

        /* --- ANIMATION ACTIONS --- */
        .anim-punch .arm-right { transform: rotate(0deg) scaleX(1.4); width: 44px; background: #fff !important; box-shadow: 0 0 10px #fff; }
        .anim-punch .torso { transform: rotate(10deg); }
        
        .anim-big-punch .arm-right { transform: rotate(-10deg) scaleX(1.75); width: 52px; background: #ffaa00 !important; box-shadow: 0 0 15px #ffaa00; }
        .anim-big-punch .torso { transform: rotate(20deg); }
        
        .anim-kick .leg-right { transform: rotate(-65deg) scaleX(1.3); width: 48px; background: #fff !important; box-shadow: 0 0 10px #fff; }
        .anim-kick .torso { transform: rotate(-15deg); }

        .anim-throw .arm-right { transform: rotate(-30deg) scaleX(1.4); background: #00f3ff !important; }
        
        .anim-duck .sprite { transform: translateY(40px) scaleY(0.6) !important; }
        .anim-duck#enemy .sprite { transform: scaleX(-1) translateY(40px) scaleY(0.6) !important; }
        
        .anim-block .arm-left { transform: rotate(250deg) translate(4px, 8px); background: #55ff55 !important; }
        .anim-block .arm-right { transform: rotate(290deg) translate(-4px, -8px); background: #55ff55 !important; }
        
        /* Aerial Spin Animation Configuration */
        .jump-spin .sprite { animation: spinMatrix 0.45s linear infinite; }
        @keyframes spinMatrix { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        #enemy.jump-spin .sprite { animation: spinMatrixEnemy 0.45s linear infinite; }
        @keyframes spinMatrixEnemy { 
            0% { transform: scaleX(-1) rotate(0deg); } 
            100% { transform: scaleX(-1) rotate(-360deg); } 
        }

        .hit-flash { filter: brightness(2.5) drop-shadow(0 0 12px #ff2a35); }

        /* Projectiles Layer System Fix */
        #projectile-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 12;
        }
        .projectile {
            position: absolute; left: 0; top: 0; z-index: 15; font-size: 32px;
            text-shadow: 0 0 8px rgba(255,255,255,0.6); will-change: transform;
        }
        
        table { width: 80%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="projectile-layer"></div>

        <div id="hud" class="hidden">
            <div class="health-bar-container">
                <span class="char-info" id="player-info">Player</span>
                <div id="player-fill" class="health-fill"></div>
            </div>
            <div id="match-stats">
                <div id="timer">60</div>
                <div id="level-badge">ROUND 1</div>
            </div>
            <div class="health-bar-container">
                <span class="char-info" id="enemy-info">Enemy</span>
                <div id="enemy-fill" class="health-fill"></div>
            </div>
        </div>

        <div id="player" class="fighter hidden" style="--char-color: #3498db;">
            <div class="sprite" id="player-sprite">
                <div class="head">
                    <div class="accessory acc-hat"></div>
                    <div class="accessory acc-mask"></div>
                    <div class="accessory acc-bow"></div>
                    <div class="accessory acc-visor"></div>
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                </div>
                <div class="torso">
                    <div class="accessory acc-belt"></div>
                    <div class="accessory acc-clover">♣</div>
                </div>
                <div class="arm arm-left"></div>
                <div class="arm arm-right"></div>
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
            </div>
        </div>

        <div id="enemy" class="fighter hidden" style="--char-color: #f1c40f;">
            <div class="sprite" id="enemy-sprite">
                <div class="head">
                    <div class="halo"></div>
                    <div class="horns"><div class="horn"></div><div class="horn horn-r"></div></div>
                    <div class="accessory acc-mask"></div>
                    <div class="accessory acc-bow"></div>
                    <div class="accessory acc-mouth"></div>
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                </div>
                <div class="torso">
                    <div class="accessory acc-belt"></div>
                    <div class="wings"><div class="wing-l"></div><div class="wing-r"></div></div>
                </div>
                <div class="arm arm-left"></div>
                <div class="arm arm-right"></div>
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
            </div>
        </div>

        <div id="home-screen" class="screen">
            <h1>Dom beats them up.</h1>
            <div class="menu-group">
                <button onclick="showScreen('char-select-screen')">Start Game</button>
                <button onclick="showScreen('leaderboard-screen')">Leaderboard</button>
            </div>
        </div>

        <div id="char-select-screen" class="screen hidden">
            <h1 style="font-size: 2rem;">Choose Your Fighter</h1>
            <div class="char-grid">
                <button class="char-btn" onclick="selectCharacter('speedways')"><span>📖</span>Speedways</button>
                <button class="char-btn" onclick="selectCharacter('lee')"><span>🍣</span>Lee</button>
                <button class="char-btn" onclick="selectCharacter('dom')"><span>🍕</span>Dom</button>
                <button class="char-btn" onclick="selectCharacter('spaniard')"><span>🥖</span>Spaniard</button>
                <button class="char-btn" onclick="selectCharacter('catterson')"><span>♣️</span>Catterson</button>
                <button class="char-btn" onclick="selectCharacter('jeff')"><span>🛞</span>Jeff</button>
            </div>
            <button style="margin-top:20px; background:#2c3040;" onclick="showScreen('home-screen')">Back</button>
        </div>

        <div id="diff-screen" class="screen hidden">
            <h1 style="font-size: 2rem;">Select Difficulty</h1>
            <div class="menu-group">
                <button onclick="startGame('easy')">Easy</button>
                <button onclick="startGame('medium')">Medium</button>
                <button onclick="startGame('hard')">Hard</button>
            </div>
        </div>

        <div id="gameover-screen" class="screen hidden">
            <h1 id="win-loss-title">MATCH OVER</h1>
            <p id="score-reporting" style="margin-bottom: 15px; color: #ffd700; font-weight: bold; font-size: 1.2rem;"></p>
            <div class="menu-group">
                <button onclick="showLeaderboardInput()">Save Score</button>
                <button onclick="returnToHome()">Home</button>
            </div>
        </div>

        <div id="leaderboard-screen" class="screen hidden">
            <h1>Leaderboard</h1>
            <div id="leaderboard-area" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                <table id="scores-table">
                    <thead><tr><th>Rank</th><th>Name</th><th>Round</th><th>Score</th></tr></thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
            <div class="menu-group" style="margin-top:10px;">
                <button onclick="returnToHome()">Back To Menu</button>
            </div>
        </div>
    </div>

    <script>
        const config = { width: 800, baseSpeed: 5.5, gravity: 0.65, groundY: 20 };

        let state = {
            playerCharKey: 'dom', difficulty: 'medium', currentLevel: 1, score: 0, 
            gameActive: false, timeLeft: 60, timerInterval: null, musicInterval: null, musicStep: 0,
            activeProjectiles: []
        };

        const charData = {
            'speedways': { name: "Speedways", color: "#3498db", theme: "theme-speedways", proj: "📖" },
            'lee': { name: "Lee", color: "#111", theme: "theme-lee", proj: "🍣" },
            'dom': { name: "Dom", color: "#008C45", theme: "theme-dom", proj: "🍕" },
            'spaniard': { name: "Spaniard", color: "#AA151B", theme: "theme-spaniard", proj: "🥖" },
            'catterson': { name: "Catterson", color: "#008000", theme: "theme-catterson", proj: "🍀" },
            'jeff': { name: "Jeff", color: "#111", theme: "theme-jeff", proj: "🛞" }
        };

        // Complete 5-Round Championship Setup Matrix
        const levelData = {
            1: { name: "Angel", color: "#f1c40f", theme: "theme-angel", proj: "⚡", health: 100, aiSpeed: 2.2 },
            2: { name: "Ninja", color: "#111", theme: "theme-ninja-enemy", proj: "✺", health: 125, aiSpeed: 3.2 },
            3: { name: "Devil", color: "#8e44ad", theme: "theme-devil", proj: "🔱", health: 150, aiSpeed: 4.2 },
            4: { name: "Ghost", color: "#95a5a6", theme: "theme-speedways", proj: "💀", health: 175, aiSpeed: 4.8 },
            5: { name: "Drogon", color: "#111", theme: "theme-drogon", proj: "🔥", health: 230, aiSpeed: 5.5 }
        };

        let player = { x: 100, y: 0, vx: 0, vy: 0, health: 100, isAttacking: false, isDucking: false, isBlocking: false, isJumping: false, lastProj: 0 };
        let enemy = { x: 600, y: 0, vy: 0, health: 100, isAttacking: false, isJumping: false, lastAttackTime: 0, lastProj: 0 };
        let leaderboard = [];

        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playTone(freq, type, dur, vol, slide = null) {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function soundFx(type) {
            if (type === 'punch') playTone(180, 'triangle', 0.12, 0.4, 60);
            if (type === 'bigpunch') playTone(120, 'sawtooth', 0.25, 0.6, 30);
            if (type === 'kick') playTone(150, 'triangle', 0.15, 0.45, 40);
            if (type === 'jump') playTone(220, 'sine', 0.18, 0.25, 450);
            if (type === 'block') playTone(90, 'square', 0.1, 0.3, 80);
            if (type === 'hit') playTone(280, 'sawtooth', 0.1, 0.5, 90);
            if (type === 'throw') playTone(550, 'sine', 0.2, 0.3, 150);
            if (type === 'fire') { 
                playTone(80, 'sawtooth', 0.4, 0.6, 250); 
                playTone(130, 'triangle', 0.3, 0.5, 50); 
            }
        }

        function playBeatStep() {
            if (!state.gameActive) return;
            state.musicStep = (state.musicStep + 1) % 8;
            let bassNotes = [55, 55, 65, 55, 73, 55, 65, 49];
            if (state.musicStep % 2 === 0) playTone(bassNotes[state.musicStep], 'triangle', 0.2, 0.18);
            if (state.musicStep === 2 || state.musicStep === 6) playTone(220, 'square', 0.06, 0.06, 80);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function selectCharacter(charKey) {
            state.playerCharKey = charKey;
            showScreen('diff-screen');
        }

        const keys = { Left: false, Right: false, Duck: false, Block: false };

        window.addEventListener('keydown', e => {
            if(!state.gameActive) return;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.Duck = true;
            if(e.code === 'Space') keys.Block = true;
            
            if((e.code === 'KeyW' || e.code === 'ArrowUp') && !player.isJumping && !player.isDucking && !player.isBlocking) {
                player.vy = -14; player.isJumping = true; soundFx('jump');
            }
            if(e.code === 'KeyJ') performAttack('punch');
            if(e.code === 'KeyU') performAttack('big-punch');
            if(e.code === 'KeyK') performAttack('kick');
            if(e.code === 'KeyL') fireProjectile(true);
        });

        window.addEventListener('keyup', e => {
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.Duck = false;
            if(e.code === 'Space') keys.Block = false;
        });

        function startGame(difficulty) {
            initAudio();
            state.difficulty = difficulty; state.currentLevel = 1; state.score = 0; state.activeProjectiles = [];
            document.getElementById('projectile-layer').innerHTML = '';
            
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('player').classList.remove('hidden');
            document.getElementById('enemy').classList.remove('hidden');
            state.gameActive = true;
            
            setupLevel(state.currentLevel);
            
            clearInterval(state.timerInterval); clearInterval(state.musicInterval);
            state.timeLeft = 60; document.getElementById('timer').innerText = state.timeLeft;
            
            state.timerInterval = setInterval(() => {
                if(!state.gameActive) return;
                state.timeLeft--; document.getElementById('timer').innerText = state.timeLeft;
                if(state.timeLeft <= 0) endGame(false, "TIME OUT!");
            }, 1000);
            state.musicInterval = setInterval(playBeatStep, 220);

            window.requestAnimationFrame(updateFrameLoop);
        }

        function setupLevel(lvl) {
            state.currentLevel = lvl;
            let eData = { ...levelData[lvl] };
            
            // Random assignment matrix for levels 1 through 4
            if (lvl < 5) {
                const opponentsPool = [
                    { name: "Angel", color: "#f1c40f", theme: "theme-angel", proj: "⚡" },
                    { name: "Blue Ninja", color: "#111", theme: "theme-ninja-enemy", proj: "✺" },
                    { name: "Devil", color: "#8e44ad", theme: "theme-devil", proj: "🔱" },
                    { name: "Catterson", color: "#008000", theme: "theme-catterson", proj: "🍀" },
                    { name: "Speedways", color: "#3498db", theme: "theme-speedways", proj: "📖" }
                ];
                const selection = opponentsPool[Math.floor(Math.random() * opponentsPool.length)];
                eData.name = selection.name;
                eData.color = selection.color;
                eData.theme = selection.theme;
                eData.proj = selection.proj;
            }

            // CRITICAL RESET FLUSH: Prevents Level 2 state freeze locks
            player.health = 100; player.x = 100; player.y = 0; player.vx = 0; player.vy = 0;
            player.isAttacking = false; player.isDucking = false; player.isBlocking = false; player.isJumping = false;
            
            enemy.health = eData.health; enemy.x = 600; enemy.y = 0; enemy.vy = 0;
            enemy.isAttacking = false; enemy.isJumping = false;
            
            keys.Left = false; keys.Right = false; keys.Duck = false; keys.Block = false;
            
            state.activeProjectiles = [];
            document.getElementById('projectile-layer').innerHTML = '';

            document.getElementById('level-badge').innerText = `ROUND ${lvl} / 5`;
            document.getElementById('player-info').innerText = charData[state.playerCharKey].name;
            document.getElementById('enemy-info').innerText = `${eData.name} [Rnd ${lvl}]`;
            
            const pData = charData[state.playerCharKey];
            const pEl = document.getElementById('player');
            pEl.style.setProperty('--char-color', pData.color);
            pEl.className = `fighter ${pData.theme}`;
            
            const eEl = document.getElementById('enemy');
            eEl.style.setProperty('--char-color', eData.color);
            eEl.className = `fighter ${eData.theme}`;
            
            // Wipe animation frames instantly
            pEl.classList.remove('anim-punch', 'anim-big-punch', 'anim-kick', 'anim-throw', 'anim-duck', 'anim-block', 'hit-flash', 'jump-spin');
            eEl.classList.remove('anim-punch', 'anim-big-punch', 'anim-kick', 'anim-throw', 'anim-duck', 'anim-block', 'hit-flash', 'jump-spin');
            
            updateVisuals();
        }

        function updateFrameLoop() {
            if(!state.gameActive) return;
            const pEl = document.getElementById('player'); const eEl = document.getElementById('enemy');
            
            player.isDucking = keys.Duck && !player.isJumping;
            player.isBlocking = keys.Block && !player.isDucking && !player.isJumping;
            
            pEl.classList.toggle('anim-duck', player.isDucking); 
            pEl.classList.toggle('anim-block', player.isBlocking);
            pEl.classList.toggle('jump-spin', player.isJumping);
            eEl.classList.toggle('jump-spin', enemy.isJumping);

            // Physics Vector Engines
            if(player.isJumping) { player.vy += config.gravity; player.y += player.vy; if(player.y >= 0) { player.y = 0; player.isJumping = false; } }
            if(enemy.isJumping) { enemy.vy += config.gravity; enemy.y += enemy.vy; if(enemy.y >= 0) { enemy.y = 0; enemy.isJumping = false; } }

            // Left/Right tracking checks
            player.vx = 0;
            if(!player.isDucking && !player.isBlocking && !player.isAttacking) {
                if(keys.Left) player.vx = -config.baseSpeed;
                if(keys.Right) player.vx = config.baseSpeed;
            }
            player.x += player.vx;
            if(player.x < 0) player.x = 0;
            if(player.x > enemy.x - 40) player.x = enemy.x - 40;

            processEnemyAI();
            processProjectiles();

            pEl.style.transform = `translate(${player.x}px, ${player.y}px)`;
            eEl.style.transform = `translate(${enemy.x}px, ${enemy.y}px)`;

            window.requestAnimationFrame(updateFrameLoop);
        }

        function processEnemyAI() {
            const currentRoundData = levelData[state.currentLevel];
            let spd = currentRoundData.aiSpeed; 
            let atkInt = 1300; 
            let projChance = 0.015;
            
            if (state.difficulty === 'easy') { spd *= 0.45; atkInt = 2400; projChance = 0.004; } 
            else if (state.difficulty === 'hard') { spd *= 1.3; atkInt = 700; projChance = 0.04; }

            const dist = enemy.x - player.x;

            if (!enemy.isAttacking) {
                if(dist > 85) enemy.x -= spd;
                else if (dist < 60) enemy.x += spd;
            }
            if(enemy.x > config.width - 95) enemy.x = config.width - 95;

            const now = Date.now();
            
            // Melee triggers
            if(dist <= 100 && (now - enemy.lastAttackTime > atkInt)) {
                performEnemyAttack(dist);
            }
            // Projectiles triggers
            else if (dist > 190 && now - enemy.lastProj > 1800 && Math.random() < projChance) {
                fireProjectile(false);
            }

            // Calmed Symmetrical Jump Randomizer: Prevents excessive bounce rates
            if (!enemy.isJumping && !enemy.isAttacking && Math.random() < 0.006) {
                enemy.vy = -12;
                enemy.isJumping = true;
                soundFx('jump');
            }
        }

        function fireProjectile(isPlayer) {
            const now = Date.now();
            const source = isPlayer ? player : enemy;
            if(source.isAttacking || source.isBlocking || source.isDucking) return;
            if(isPlayer && now - player.lastProj < 800) return;
            
            source.isAttacking = true; source.lastProj = now;
            
            // Trigger customized Dragon audio logic
            if(!isPlayer && state.currentLevel === 5) {
                soundFx('fire');
            } else {
                soundFx('throw');
            }
            
            const el = document.getElementById(isPlayer ? 'player' : 'enemy');
            el.classList.add('anim-throw');

            // Collect active layout mappings
            let symbol = isPlayer ? charData[state.playerCharKey].proj : levelData[state.currentLevel].proj;
            
            // If the assignment engine rolled an enemy character style for rounds 1-4, pull its assigned graphic
            if(!isPlayer && state.currentLevel < 5) {
                const badge = document.getElementById('enemy-info').innerText;
                if(badge.includes("Angel")) symbol = "⚡";
                else if(badge.includes("Ninja")) symbol = "✺";
                else if(badge.includes("Devil")) symbol = "🔱";
                else if(badge.includes("Catterson")) symbol = "🍀";
                else if(badge.includes("Speedways")) symbol = "📖";
            }

            // Absolute calculations matching hands cleanly
            const px = isPlayer ? source.x + 65 : source.x - 15;
            const py = 255 + source.y; 

            const pDiv = document.createElement('div');
            pDiv.className = 'projectile'; pDiv.innerText = symbol;
            document.getElementById('projectile-layer').appendChild(pDiv);

            state.activeProjectiles.push({
                isPlayer: isPlayer, x: px, y: py,
                vx: isPlayer ? 11 : -11,
                el: pDiv, active: true
            });

            setTimeout(() => { el.classList.remove('anim-throw'); source.isAttacking = false; }, 250);
        }

        function processProjectiles() {
            state.activeProjectiles.forEach(p => {
                if(!p.active) return;
                p.x += p.vx;
                p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;

                const target = p.isPlayer ? enemy : player;
                const tx = target.x;
                
                let hit = false;
                if(p.isPlayer && p.x > tx + 20 && p.x < tx + 75) hit = true;
                if(!p.isPlayer && p.x < tx + 60 && p.x > tx + 5) hit = true;

                if(hit) {
                    p.active = false; p.el.remove();
                    
                    if(!p.isPlayer && player.isDucking) return; 
                    if(!p.isPlayer && player.isBlocking) { soundFx('block'); target.health -= 2; }
                    else {
                        soundFx('hit'); 
                        let baseDamage = 14;
                        if(!p.isPlayer && state.currentLevel === 5) baseDamage = 22; // Drogon flame multi
                        target.health -= baseDamage;
                        
                        const tel = document.getElementById(p.isPlayer ? 'enemy' : 'player');
                        tel.classList.add('hit-flash'); setTimeout(() => tel.classList.remove('hit-flash'), 120);
                        if(p.isPlayer) state.score += baseDamage * (state.difficulty === 'hard' ? 3 : 1);
                    }
                    checkMatch();
                } else if (p.x < -60 || p.x > config.width + 60) {
                    p.active = false; p.el.remove();
                }
            });
            state.activeProjectiles = state.activeProjectiles.filter(p => p.active);
        }

        function performAttack(type) {
            if(!state.gameActive || player.isAttacking || player.isDucking || player.isBlocking) return;
            player.isAttacking = true;
            const pEl = document.getElementById('player'); pEl.classList.add(`anim-${type}`);
            
            if(type === 'punch') soundFx('punch');
            if(type === 'big-punch') soundFx('bigpunch');
            if(type === 'kick') soundFx('kick');

            const dist = enemy.x - player.x;
            let rng = type === 'big-punch' ? 120 : 100;

            if(dist > 0 && dist <= rng) {
                let dmg = type === 'big-punch' ? 22 : (type === 'kick' ? 14 : 10);
                enemy.health -= dmg;
                state.score += dmg * (state.difficulty === 'hard' ? 3 : state.difficulty === 'medium' ? 2 : 1);
                soundFx('hit');
                const eEl = document.getElementById('enemy'); eEl.classList.add('hit-flash');
                setTimeout(() => eEl.classList.remove('hit-flash'), 120);
            }

            setTimeout(() => { pEl.classList.remove(`anim-${type}`); player.isAttacking = false; checkMatch(); }, type === 'big-punch' ? 340 : 200);
        }

        function performEnemyAttack(dist) {
            enemy.lastAttackTime = Date.now(); enemy.isAttacking = true;
            const eEl = document.getElementById('enemy');
            
            let atkType = Math.random() > 0.65 ? 'anim-kick' : 'anim-punch';
            if((state.currentLevel === 3 || state.currentLevel === 5) && Math.random() > 0.5) atkType = 'anim-big-punch';
            
            eEl.classList.add(atkType);
            soundFx(atkType.includes('big') ? 'bigpunch' : (atkType.includes('kick') ? 'kick' : 'punch'));

            if(dist > 0 && dist <= 105) {
                if (player.isDucking && atkType !== 'anim-kick') {} 
                else {
                    let bdmg = state.currentLevel >= 4 ? 18 : 12;
                    if(atkType === 'anim-big-punch') bdmg = 25;
                    if(state.difficulty === 'easy') bdmg *= 0.4; if(state.difficulty === 'hard') bdmg *= 1.45;
                    
                    if (player.isBlocking) { bdmg *= 0.15; soundFx('block'); } 
                    else {
                        soundFx('hit'); const pEl = document.getElementById('player');
                        pEl.classList.add('hit-flash'); setTimeout(() => pEl.classList.remove('hit-flash'), 120);
                    }
                    player.health -= Math.round(bdmg);
                }
            }
            setTimeout(() => { eEl.classList.remove(atkType); enemy.isAttacking = false; checkMatch(); }, 240);
        }

        function updateVisuals() {
            document.getElementById('player-fill').style.width = `${Math.max(0, player.health)}%`;
            const mHp = levelData[state.currentLevel].health;
            // Handle display scaling relative to dynamic level matrix configs
            const matchName = document.getElementById('enemy-info').innerText;
            let currentLevelMaxHp = mHp;
            if (state.currentLevel < 5) {
                // Keep scaled health parameters sync'd properly with the pool
                currentLevelMaxHp = levelData[state.currentLevel].health;
            }
            document.getElementById('enemy-fill').style.width = `${Math.max(0, (enemy.health / currentLevelMaxHp) * 100)}%`;
        }

        function checkMatch() {
            updateVisuals();
            if(player.health <= 0) { playTone(140, 'sawtooth', 0.8, 0.5, 30); endGame(false, "YOU LOSE"); }
            else if(enemy.health <= 0) {
                if(state.currentLevel < 5) {
                    playTone(420, 'sine', 0.35, 0.3, 620);
                    state.currentLevel++; 
                    setupLevel(state.currentLevel);
                } else {
                    playTone(320, 'sine', 0.2, 0.4, 520); setTimeout(() => playTone(520, 'sine', 0.5, 0.4, 950), 140);
                    endGame(true, "CHAMPION VICTORY!");
                }
            }
        }

        function endGame(isWin, msg) {
            state.gameActive = false; clearInterval(state.timerInterval); clearInterval(state.musicInterval);
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('player').classList.add('hidden');
            document.getElementById('enemy').classList.add('hidden');
            document.getElementById('win-loss-title').innerText = msg;
            document.getElementById('score-reporting').innerText = `Final Score: ${state.score}`;
            showScreen('gameover-screen');
        }

        function showLeaderboardInput() {
            let initials = prompt("Enter your name:", "PLAYER");
            if (!initials) initials = "UNKNOWN";
            leaderboard.push({ name: initials.substring(0,10).toUpperCase(), level: state.currentLevel, score: state.score });
            leaderboard.sort((a,b) => b.score - a.score);
            
            const tbody = document.getElementById('leaderboard-body'); tbody.innerHTML = "";
            leaderboard.forEach((r,i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>#${i+1}</td><td>${r.name}</td><td>Round ${r.level}</td><td style="color:#ffd700; font-weight:bold;">${r.score}</td>`;
                tbody.appendChild(tr);
            });
            showScreen('leaderboard-screen');
        }

        function returnToHome() { showScreen('home-screen'); }
    </script>
</body>
</html>
