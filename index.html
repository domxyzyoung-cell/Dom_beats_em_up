<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dom beats em up.</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; touch-action: none; }
        body { background-color: #050508; font-family: 'Courier New', Courier, monospace; color: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100dvh; width: 100vw; }
        
        #canvas-scaler { transform-origin: center center; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        #game-container { position: relative; width: 800px; height: 380px; background: linear-gradient(to bottom, #2b324c 0%, #1a1e2e 100%); border: 4px solid #444; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        /* Perfect Centerline Geometry Wrapper */
        .fighter { position: absolute; bottom: 20px; width: 120px; height: 150px; }
        .sprite-wrapper { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; transform: scale(var(--c-scale, 1)); transform-origin: bottom center; }
        
        .head { width: 34px; height: 34px; border: 3px solid var(--char-color); background: #111; border-radius: 50%; position: relative; z-index: 10; }
        .eyes { display: flex; gap: 4px; position: absolute; top: 12px; left: 10px; }
        .eye { width: 4px; height: 4px; background: #fff; border-radius: 50%; }
        
        .torso { width: 20px; height: 45px; background: var(--torso-color, var(--char-color)); border-radius: 4px; position: relative; margin-top: -2px; z-index: 5; }
        .arm { width: 40px; height: 8px; background: var(--limb-color, var(--char-color)); position: absolute; top: 10px; border-radius: 4px; transform-origin: left center; }
        .leg { width: 10px; height: 40px; background: var(--limb-color, var(--char-color)); position: absolute; bottom: -40px; border-radius: 2px; }

        /* Character Specific Classes */
        .theme-lee { --char-color: #000; --torso-color: #000; --limb-color: #e51b24; }
        .theme-lee .head { border-color: #000; background: #000; }
        .theme-lee .acc-bandana { display: block; position: absolute; top: 8px; left: -2px; width: 38px; height: 8px; background: #e51b24; }
        .theme-lee .acc-belt { display: block; position: absolute; bottom: 5px; width: 24px; height: 4px; background: #e51b24; left: -2px;}
        .theme-lee .acc-bow { display: block; position: absolute; top: 10px; right: -5px; width: 10px; height: 10px; background: #e51b24; border-radius: 2px;}

        .theme-ninja { --char-color: #000; --torso-color: #000; --limb-color: #0033ff; }
        .theme-ninja .head { border-color: #000; background: #000; }
        .theme-ninja .acc-bandana { display: block; position: absolute; top: 8px; left: -2px; width: 38px; height: 8px; background: #0033ff; }
        .theme-ninja .acc-belt { display: block; position: absolute; bottom: 5px; width: 24px; height: 4px; background: #0033ff; left: -2px;}
        .theme-ninja .acc-bow { display: block; position: absolute; top: 10px; right: -5px; width: 10px; height: 10px; background: #0033ff; border-radius: 2px;}

        .theme-drogon { --c-scale: 1.5; --char-color: #ff0000; --torso-color: #000; }
        .theme-drogon .torso { border: 2px solid #ffaa00; }
        .theme-drogon .head { background: #000; border-color: #ff0000; }
        .theme-drogon .eyes { background: #ff0000; }
        .theme-drogon .wing { display: block; position: absolute; top: 0; left: -40px; width: 100px; height: 30px; background: #333; clip-path: polygon(0 100%, 100% 0, 100% 100%); }

        .accessory { display: none; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; }
        .hidden { display: none !important; }
        
        #projectile-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .projectile { position: absolute; font-size: 24px; }

        /* Controls */
        #mobile-controls { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 200; }
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="canvas-scaler">
        <div id="game-container">
            <div id="projectile-layer"></div>
            
            <div id="player" class="fighter theme-lee">
                <div class="sprite-wrapper">
                    <div class="head">
                        <div class="accessory acc-bandana"></div>
                        <div class="accessory acc-bow"></div>
                        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    </div>
                    <div class="torso">
                        <div class="accessory acc-belt"></div>
                        <div class="arm" style="left: -20px;"></div>
                        <div class="arm" style="left: 20px;"></div>
                        <div class="leg" style="left: 0px;"></div>
                    </div>
                </div>
            </div>

            <div id="enemy" class="fighter">
                <div class="sprite-wrapper">
                    <div class="wing"></div>
                    <div class="head">
                        <div class="accessory acc-bandana"></div>
                        <div class="accessory acc-bow"></div>
                        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    </div>
                    <div class="torso">
                        <div class="accessory acc-belt"></div>
                        <div class="arm" style="left: -20px;"></div>
                        <div class="arm" style="left: 20px;"></div>
                        <div class="leg" style="left: 0px;"></div>
                    </div>
                </div>
            </div>

            <div id="home-screen" class="screen">
                <h1>DOM BEATS EM UP</h1>
                <button onclick="startGame()">START FIGHT</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="btn" onclick="move(-10)">←</div>
        <div class="btn" onclick="move(10)">→</div>
        <div class="btn" onclick="fire()">🔥</div>
    </div>

    <script>
        const state = { gameActive: false, level: 1, pX: 100, eX: 600, projectiles: [] };
        
        const catalog = {
            'lee': { theme: 'theme-lee', color: '#000', name: 'Lee' },
            'ninja': { theme: 'theme-ninja', color: '#000', name: 'Ninja' },
            'drogon': { theme: 'theme-drogon', color: '#000', name: 'Drogon' }
        };

        function startGame() {
            document.getElementById('home-screen').classList.add('hidden');
            state.gameActive = true;
            setupLevel(1);
            requestAnimationFrame(loop);
        }

        function setupLevel(lvl) {
            state.level = lvl;
            const enemyEl = document.getElementById('enemy');
            
            // Set Enemy Logic
            if (lvl === 5) {
                enemyEl.className = 'fighter theme-drogon';
            } else {
                enemyEl.className = Math.random() > 0.5 ? 'fighter theme-lee' : 'fighter theme-ninja';
            }
        }

        function move(dir) { state.pX += dir; }

        function fire() {
            const pLayer = document.getElementById('projectile-layer');
            const div = document.createElement('div');
            div.className = 'projectile';
            div.innerText = state.level === 5 ? '🔥' : '💥';
            div.style.left = state.pX + 'px';
            div.style.top = '150px';
            pLayer.appendChild(div);
            state.projectiles.push({ el: div, x: state.pX, y: 150 });
        }

        function loop() {
            if (!state.gameActive) return;

            // Render positions
            document.getElementById('player').style.left = state.pX + 'px';
            document.getElementById('enemy').style.left = state.eX + 'px';

            // Projectiles
            state.projectiles.forEach((p, index) => {
                p.x += 10;
                p.el.style.left = p.x + 'px';
                if (p.x > 800) { p.el.remove(); state.projectiles.splice(index, 1); }
            });

            // Logic: Jump randomness (reduced for Ninja/Lee)
            if (Math.random() < 0.005) { /* Perform Jump Logic */ }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
